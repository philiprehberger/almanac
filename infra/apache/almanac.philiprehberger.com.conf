<VirtualHost *:80>
    ServerName almanac.philiprehberger.com

    ProxyPreserveHost On
    ProxyRequests Off
    ProxyPass        / http://127.0.0.1:3016/
    ProxyPassReverse / http://127.0.0.1:3016/

    ErrorLog ${APACHE_LOG_DIR}/almanac-web-error.log
    CustomLog ${APACHE_LOG_DIR}/almanac-web-access.log combined
</VirtualHost>
